<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champion Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bodyContainer">
        <div id="h1Container">
            <h1 id="myH1"> Pick a champion! </h1>
        </div><br>
       <input type="text" id="championName" placeholder="Champion Name:" autofocus><br>
       <button id="champPick" onclick="prepareText()"> Search champion!</button><br>
       <div id="nameContainer">
        <h2 id="name"> Champion </h2>
       </div>
       <div id="titleContainer">
        <button class="skinBtn" id="prevSkin" onclick="getPrevSkin()"></button>
        <h3 id="title"> Title </h3>
        <button class="skinBtn" id="nextSkin" onclick="getNextSkin()"></button>
       </div>
       <br><br>
       <div id="blurbContainer">
        <p id="blurb"> Blurb </p>
       </div>
    </div>
    
   
    <script src="index.js"></script>
</body>
</html>
